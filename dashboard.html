<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - FashionList</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="brandMark">FL</div>
        <div>
          <h1 class="title">FashionList</h1>
          <p class="subtitle">Snap any trim, bead, zip, feather, or button to see the price.</p>
        </div>
      </div>
      <button id="logoutBtn" class="btn secondary" style="max-width:140px;">Logout</button>
    </div>

    <div class="grid">
      <div class="card">
        <video id="webcam" class="camera" autoplay playsinline></video>
        <div class="controls">
          <button id="cameraBtn" class="btn secondary">Start Camera</button>
          <button id="snapBtn" class="btn">Snap &amp; Price</button>
        </div>
      </div>

      <div class="card">
        <label for="imageInput" class="uploadBox">
          <strong>Upload an image</strong><br>
          <small>JPG or PNG</small>
        </label>
        <input type="file" id="imageInput" accept="image/*" hidden>
        <img id="preview" class="preview" alt="Preview">
      </div>
    </div>

    <div class="resultBox">
      <p class="statusLabel">Result</p>
      <div id="loader" class="loader"></div>
      <p id="resultText" class="resultText">Awaiting scan...</p>
      <div id="missingCard" class="card" style="display:none; margin-top:12px; background:#0d1528;">
        <p class="statusLabel" id="missingMaterial">Material not found. Enter price.</p>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <input id="missingPrice" type="number" min="0" step="1" class="input" placeholder="Enter price in ₦" style="margin-bottom:0; flex:1;">
          <button id="saveMaterialBtn" class="btn" style="min-width:120px;">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
